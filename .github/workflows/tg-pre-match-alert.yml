name: TG 賽前 1 小時提醒

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分鐘跑一次
  workflow_dispatch:

concurrency:
  group: tg-prematch
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps + CJK fonts (canvas needs them)
        run: |
          npm install
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: Phase 1 — TG push + 產 IG 限動圖
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE330_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TG_NEWSLETTER_CHANNEL_ID }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_URL: https://worldcup2026-9u0.pages.dev
        run: node scripts/push-pre-match-alert.js

      - name: Commit images + state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase --autostash || true
          git add og/ig-story-prematch/ og/.tg-prematch-state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore(tg-prematch): images + state"
            git push
          fi

      - name: Wait for Cloudflare deploy
        run: sleep 90

      - name: Phase 2 — 上傳 IG 限動
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE330_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TG_NEWSLETTER_CHANNEL_ID }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_URL: https://worldcup2026-9u0.pages.dev
        run: node scripts/push-pre-match-alert.js --post-ig

      - name: Commit IG state
        if: always()
        run: |
          git pull --rebase --autostash || true
          git add og/.tg-prematch-state.json 2>/dev/null || true
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "chore(tg-prematch): ig posted state"
          git push || true
