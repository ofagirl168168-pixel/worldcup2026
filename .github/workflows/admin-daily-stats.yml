name: Admin 每日數據摘要推送

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC = 08:30 TW（早安球迷 08:00 後 30 分）
  workflow_dispatch:

concurrency:
  group: admin-stats
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Push admin daily stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MADDY_BOT_TOKEN: ${{ secrets.MADDY_BOT_TOKEN }}
          ADMIN_TG_CHAT_ID: ${{ secrets.MADDY_CHAT_ID }}
        run: node scripts/push-admin-daily-stats.js
