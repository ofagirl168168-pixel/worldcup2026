name: 補產朋友房 OG 縮圖

# 使用者建房後，他們的房沒有 PNG 縮圖（只官方房日更會跑 build-room-og）。
# 這個 workflow 每 5 分鐘掃 DB，把缺縮圖的 open/locked/live 房補上。
# Cloudflare Pages 看到 og/r/ 有新檔會自動 redeploy → 分享立刻有客製預覽。

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分鐘
  workflow_dispatch:        # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Noto CJK font (中文渲染需要)
        run: sudo apt-get update -y && sudo apt-get install -y fonts-noto-cjk

      - name: Install npm deps
        run: npm ci || npm install

      - name: Render missing OG images
        # Supabase URL/key 走 script 內 fallback（publishable key、讀 RLS 開放）
        run: node scripts/build-room-og.js --skip-existing

      - name: Auto-settle ended rooms
        # 沒人開頁的話 friend_room_settle 不會被觸發 → 寶石永遠不發
        # 這裡 sweep 一次：對所有 status=ended AND settled_at IS NULL 的房 call friend_room_settle
        # RPC 內已 race-safe lock，重複 call 不會重發
        run: |
          curl -s -X POST 'https://dwlngkspwtcsnacbsgct.supabase.co/rest/v1/rpc/friend_rooms_settle_all_unsettled' \
            -H 'apikey: sb_publishable_XOYghSiO49fG8nMsztm-cQ_l_Tt6V1u' \
            -H 'Authorization: Bearer sb_publishable_XOYghSiO49fG8nMsztm-cQ_l_Tt6V1u' \
            -H 'Content-Type: application/json' \
            -d '{}' | tee /tmp/settle.json
          echo

      - name: Commit and push if any new PNG
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add og/r/
          git diff --staged --quiet || (git commit -m "chore(og): auto-render new room OG images $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
