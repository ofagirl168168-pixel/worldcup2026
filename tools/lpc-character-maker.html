<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>LPC 角色生成器 — 預覽工具</title>
<style>
  body {
    background: #0d1224;
    color: #fff;
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 22px; margin: 0 0 6px; }
  .hint { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 18px; }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    max-width: 960px;
  }

  /* Preview area */
  .preview {
    background: linear-gradient(180deg, #1a1a2e 0%, #0d1224 100%);
    border: 2px solid rgba(240,192,64,0.4);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .preview h2 { font-size: 14px; color: #f0c040; margin: 0 0 10px; }
  .preview-portrait {
    width: 160px; height: 160px;
    margin: 0 auto 12px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.25);
    background: radial-gradient(circle, #2a1855 0%, #0d1224 100%);
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .preview-portrait canvas {
    width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .preview-sprite canvas {
    display: block;
  }
  .preview-sprite {
    background: linear-gradient(180deg, #2e7d32 0%, #1b5e20 100%);
    border-radius: 10px;
    padding: 8px;
    display: inline-block;
  }
  .preview-sprite canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .preview-meta {
    margin-top: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-family: monospace;
  }
  .preview-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }
  .preview-actions button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .preview-actions button:hover { background: rgba(240,192,64,0.2); border-color: #f0c040; }

  /* Selectors */
  .panel { margin-bottom: 22px; }
  .panel h3 {
    font-size: 13px; color: #f0c040;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 6px;
    margin: 0 0 10px;
    letter-spacing: 1px;
  }
  .opt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 6px;
  }
  .opt {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
  }
  .opt:hover { background: rgba(255,255,255,0.1); }
  .opt.sel { border-color: #f0c040; background: rgba(240,192,64,0.12); }
  .opt canvas {
    width: 48px; height: 48px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    margin-bottom: 4px;
    image-rendering: pixelated;
  }
  .opt-label { font-size: 10px; opacity: 0.8; }

  .color-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .swatch {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.sel { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 0 2px #f0c040; }
</style>
</head>
<body>

<h1>🎮 LPC 角色生成器（預覽工具）</h1>
<div class="hint">
  試玩 LPC layered 系統，可換膚色 / 髮型 / 髮色 / 球衣樣式 / 球衣顏色。
  滿意這套品質就告訴 Claude「整合進 app」、我幫你做 in-app 客製化 modal。
</div>

<div class="layout">

  <!-- 左：預覽 -->
  <div class="preview">
    <h2>頭像（卡片用）</h2>
    <div class="preview-portrait"><canvas id="preview-portrait" width="64" height="64"></canvas></div>
    <h2 style="margin-top:14px">走路動畫（比賽用）</h2>
    <div class="preview-sprite"><canvas id="preview-walk" width="96" height="64"></canvas></div>
    <div class="preview-meta" id="preview-meta">—</div>
    <div class="preview-actions">
      <button onclick="randomize()">🎲 隨機</button>
      <button onclick="copyLook()">📋 複製設定</button>
    </div>
  </div>

  <!-- 右：選項 -->
  <div class="options">
    <div class="panel">
      <h3>🧑 膚色</h3>
      <div class="opt-grid" id="opt-body"></div>
    </div>
    <div class="panel">
      <h3>💇 髮型</h3>
      <div class="opt-grid" id="opt-hair-style"></div>
    </div>
    <div class="panel">
      <h3>🎨 髮色</h3>
      <div class="color-row" id="opt-hair-color"></div>
    </div>
    <div class="panel">
      <h3>👕 球衣樣式</h3>
      <div class="opt-grid" id="opt-shirt-style"></div>
    </div>
    <div class="panel">
      <h3>🎨 球衣顏色</h3>
      <div class="color-row" id="opt-shirt-color"></div>
    </div>
    <div class="panel">
      <h3>👖 球褲顏色</h3>
      <div class="color-row" id="opt-pants-color"></div>
    </div>
    <div class="panel">
      <h3>👁 眼睛顏色</h3>
      <div class="color-row" id="opt-eye-color"></div>
    </div>
    <div class="panel">
      <h3>😬 皺紋/傷疤（老將標記）</h3>
      <div class="opt-grid" id="opt-wrinkles"></div>
    </div>
    <div class="panel">
      <h3>🧔 鬍子</h3>
      <div class="opt-grid" id="opt-beard-style"></div>
    </div>
    <div class="panel">
      <h3>👨 鬍髭</h3>
      <div class="opt-grid" id="opt-mustache-style"></div>
    </div>
    <div class="panel">
      <h3>🎨 鬍子顏色（鬍子+鬍髭共用）</h3>
      <div class="color-row" id="opt-beard-color"></div>
    </div>
    <div class="panel">
      <h3>👟 球鞋顏色</h3>
      <div class="color-row" id="opt-shoe-color"></div>
    </div>
    <div class="panel">
      <h3>💪 護腕顏色</h3>
      <div class="color-row" id="opt-wrist-color"></div>
    </div>
  </div>

</div>

<script>
const BASE = '../img/lpc-layers';
// 內建 manifest（避開 file:// fetch 限制；雙擊本檔開啟也能跑）
const manifest = {
  bodies: ['light', 'olive', 'amber', 'brown', 'bronze'],
  eye_colors: ['blue', 'brown', 'gray', 'green', 'orange', 'purple', 'red', 'yellow'],
  eyebrow_styles: ['none', 'thick', 'thin'],
  eyebrow_colors: ['black', 'blonde', 'red', 'white', 'gray', 'ginger'],
  headband_colors: ['none', 'red', 'blue', 'black', 'white', 'green', 'yellow', 'purple'],
  wrinkle_options: ['none', 'on'],   // on = 套用該膚色的皺紋層
  hair_styles: ['bald', 'messy1', 'messy2', 'long', 'spiked', 'loose', 'curly_long', 'bedhead',
                'afro', 'pixie', 'shorthawk', 'swoop', 'wavy', 'plain',
                'bangs', 'bangsshort', 'bangslong', 'dreadlocks_long', 'flat_top_fade',
                'high_and_tight', 'high_ponytail', 'long_messy', 'mop', 'spiked_liberty',
                'balding', 'buzzcut'],
  hair_colors: ['black', 'blonde', 'red', 'white', 'ginger', 'blue', 'purple', 'gray'],
  beard_styles: ['none', '5oclock_shadow', 'basic', 'medium', 'trimmed'],
  mustache_styles: ['none', 'basic', 'handlebar', 'horseshoe', 'walrus', 'french', 'chevron', 'bigstache', 'lampshade'],
  beard_colors: ['black', 'blonde', 'red', 'white', 'gray', 'ginger'],
  shirt_styles: ['shortsleeve', 'sleeveless'],
  shirt_colors_short: ['red','blue','black','white','green','yellow','teal','purple','orange'],
  shirt_colors_sleeve: ['red','blue','black','yellow'],
  pants_colors: ['red','blue','black','white','green','yellow','teal','purple','orange','brown','tan'],
  // 球鞋固定 flat、不開款式選單；只挑顏色（含 none = 光腳）
  shoe_styles: ['flat'],
  shoe_colors: ['none', 'black', 'brown', 'white', 'red', 'blue', 'yellow', 'green'],
  wrist_colors: ['none', 'red', 'blue', 'black', 'white', 'green', 'yellow'],
};
const state = {
  body: 'light',
  eye_color: 'blue',
  wrinkles: 'none',
  hair_style: 'messy1',
  hair_color: 'black',
  beard_style: 'none',
  beard_color: 'black',
  mustache_style: 'none',
  shirt_style: 'shortsleeve',
  shirt_color: 'red',
  pants_color: 'blue',
  shoe_style: 'flat',
  shoe_color: 'none',
  wrist_color: 'none',
};

const COLOR_HEX = {
  black: '#1a1a1a', blonde: '#e8d068', red: '#c0392b', white: '#ddd', brown: '#8b4513',
  blue: '#2196f3', green: '#27ae60', yellow: '#f1c40f', teal: '#16a085',
  purple: '#9b59b6', orange: '#e67e22', ginger: '#cd6e3a', gray: '#888',
  // 眼睛色：用 LPC 內建 sprite 抓出的近似色當 swatch
  // blue/brown/gray/green 已存在；補 orange/purple/red/yellow（這些跟其他類別重名 → 就讓 swatch 同色）
};

const imgCache = new Map();
function loadImg(url) {
  if (imgCache.has(url)) return imgCache.get(url);
  const p = new Promise((res, rej) => {
    const im = new Image();
    // 不設 crossOrigin（file:// 會卡 CORS）
    im.onload = () => res(im);
    im.onerror = (e) => { console.error('load fail:', url); rej(e); };
    im.src = url;
  });
  imgCache.set(url, p);
  return p;
}

async function getLayer(category, name) {
  const url = `${BASE}/${category}/${name}.png`;
  return await loadImg(url);
}

// 可選 layer：傳 null 表示不畫
async function getHair(look) {
  if (look.hair_style === 'bald') return null;
  return await getLayer('hair', `${look.hair_style}-${look.hair_color}`);
}
async function getBeard(look) {
  if (look.beard_style === 'none') return null;
  return await getLayer('beard', `${look.beard_style}-${look.beard_color}`);
}
async function getMustache(look) {
  if (look.mustache_style === 'none') return null;
  return await getLayer('mustache', `${look.mustache_style}-${look.beard_color}`);
}
async function getShoes(look) {
  if (look.shoe_color === 'none') return null;
  return await getLayer(`shoes-flat`, look.shoe_color);  // 固定 flat
}
async function getWrist(look) {
  if (look.wrist_color === 'none') return null;
  return await getLayer('wrist', look.wrist_color);
}
async function getWrinkles(look) {
  if (look.wrinkles === 'none') return null;
  return await getLayer('wrinkles', look.body);
}

// 合成頭像（含 LPC 5 層 + 手繪表情 override）
// 角色佔 frame y=4..43（頭+軀幹+大腿）、source 32×40 → 4× = 128×160
async function renderPortrait(canvas, look) {
  const [body, head, wrinkles, eyes, beard, mustache, hair, shirt, pants, wrist] = await Promise.all([
    getLayer('body', look.body),
    getLayer('head', look.body),
    getWrinkles(look),
    getLayer('eyes', look.eye_color),
    getBeard(look),
    getMustache(look),
    getHair(look),
    getLayer('shirt', `${look.shirt_style}-${look.shirt_color}`),
    getLayer('pants', look.pants_color),
    getWrist(look),
  ]);
  const SX = 16, SY = 640 + 4, SW = 32, SH = 40;
  const off = document.createElement('canvas');
  off.width = SW; off.height = SH;
  const offCtx = off.getContext('2d');
  offCtx.imageSmoothingEnabled = false;
  // 圖層順序：body → pants → shirt → cuffs → head → wrinkles → eyes → beard → mustache → hair
  // 卡片頭像看不到鞋（feet 在 SH=40 切掉了）
  for (const layer of [body, pants, shirt, wrist, head, wrinkles, eyes, beard, mustache, hair]) {
    if (layer) offCtx.drawImage(layer, SX, SY, SW, SH, 0, 0, SW, SH);
  }

  const SCALE = 4;
  canvas.width = 160; canvas.height = 160;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 160, 160);
  const dx = (160 - SW * SCALE) / 2;
  const dy = (160 - SH * SCALE) / 2;
  ctx.drawImage(off, 0, 0, SW, SH, dx, dy, SW * SCALE, SH * SCALE);
}

// 走路動畫 (96×128 full sprite sheet, animated)
async function renderWalk(canvas, look) {
  canvas.width = 96 * 3; canvas.height = 64 * 3; // 3x scale for visibility
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const body = await getLayer('body', look.body);
  const hair = await getLayer('hair', `${look.hair_style}-${look.hair_color}`);
  const shirt = await getLayer('shirt', `${look.shirt_style}-${look.shirt_color}`);

  // Show walk-down (row 10, y=640) 9 frames horizontally
  // Each frame 64×64, character at y=32-61 within frame
  // Display: 9 frames at 3x scale = 9×192 wide. Too wide.
  // Better: just 3 frames (walk cycle 0/1/2) of walk-down at 3x = 3×192=576 wide. Still too wide.
  // Use canvas 96×64 actual, scale via CSS
  canvas.width = 96; canvas.height = 64;
  canvas.style.width = (96 * 3) + 'px';
  canvas.style.height = (64 * 3) + 'px';
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 96, 64);

  // 3 frames of walk-down (idle / step1 / step2)
  // LPC walk row has 9 frames: 0=null, 1-8=walk cycle. We pick frames 1, 5, 7
  const animFrames = [1, 4, 7];
  for (let i = 0; i < 3; i++) {
    const srcX = animFrames[i] * 64;
    const srcY = 640 + 28;  // start above head
    for (const layer of [body, shirt, hair]) {
      ctx.drawImage(layer, srcX, srcY, 32, 36, i * 32, 0, 32, 36);
    }
  }
}

let walkAnimId = null;
async function animateWalk(canvas, look) {
  if (walkAnimId) cancelAnimationFrame(walkAnimId);
  // 比賽用側面右走（LPC row 11, y=704）— 足球場標準視角
  // 不畫 face overlay：側臉沒清晰眼睛、加 overlay 反而會歪
  const SW = 40, SH = 60, SX_OFFSET = 12, SY_OFFSET = 4;
  const WALK_RIGHT_Y = 704;
  const SCALE = 3;
  canvas.width = SW * SCALE; canvas.height = SH * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const [body, head, wrinkles, eyes, beard, mustache, hair, shirt, pants, shoes, wrist] = await Promise.all([
    getLayer('body', look.body),
    getLayer('head', look.body),
    getWrinkles(look),
    getLayer('eyes', look.eye_color),
    getBeard(look),
    getMustache(look),
    getHair(look),
    getLayer('shirt', `${look.shirt_style}-${look.shirt_color}`),
    getLayer('pants', look.pants_color),
    getShoes(look),
    getWrist(look),
  ]);

  const frames = [1, 2, 3, 4, 5, 6, 7, 8];
  let tick = 0;
  function frame() {
    const f = frames[Math.floor(tick / 6) % frames.length];
    ctx.clearRect(0, 0, SW * SCALE, SH * SCALE);
    // 圖層順序：body → pants → shoes → shirt → cuffs → head → wrinkles → eyes → beard → mustache → hair
    for (const layer of [body, pants, shoes, shirt, wrist, head, wrinkles, eyes, beard, mustache, hair]) {
      if (layer) ctx.drawImage(layer, f * 64 + SX_OFFSET, WALK_RIGHT_Y + SY_OFFSET, SW, SH, 0, 0, SW * SCALE, SH * SCALE);
    }
    tick++;
    walkAnimId = requestAnimationFrame(frame);
  }
  frame();
}

async function rerender() {
  await renderPortrait(document.getElementById('preview-portrait'), state);
  // Use animated walk
  animateWalk(document.getElementById('preview-walk'), state);
  document.getElementById('preview-meta').textContent =
    JSON.stringify(state, null, 0).replace(/[{}"]/g, '').replace(/,/g, ' / ');
}

function setOpt(category, value) {
  state[category] = value;
  document.querySelectorAll(`[data-${category}]`).forEach(el => {
    el.classList.toggle('sel', el.dataset[category] === value);
  });
  rerender();
}

async function buildOption(containerId, category, items, isColor) {
  const c = document.getElementById(containerId);
  for (const item of items) {
    const div = document.createElement('div');
    div.className = isColor ? 'swatch' : 'opt';
    div.dataset[category] = item;
    if (isColor) {
      if (item === 'none') {
        // 「無」swatch：透明背景 + 對角紅線（表示「不戴」）
        div.style.background =
          'linear-gradient(135deg, transparent 45%, #c00 45%, #c00 55%, transparent 55%)';
        div.title = '無';
      } else {
        div.style.background = COLOR_HEX[item] || '#888';
      }
    } else {
      const cv = document.createElement('canvas');
      cv.width = 32; cv.height = 40;
      div.appendChild(cv);
      const label = document.createElement('div');
      label.className = 'opt-label';
      label.textContent = item;
      div.appendChild(label);
      // 預覽該 option 的 preview thumbnail
      setTimeout(async () => {
        const ctx = cv.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const tempLook = { ...state, [category]: item };
        try {
          const [body, head, wrinkles, eyes, beard, mustache, hair, shirt, pants, wrist] = await Promise.all([
            getLayer('body', tempLook.body),
            getLayer('head', tempLook.body),
            getWrinkles(tempLook),
            getLayer('eyes', tempLook.eye_color),
            getBeard(tempLook),
            getMustache(tempLook),
            getHair(tempLook),
            getLayer('shirt', `${tempLook.shirt_style}-${tempLook.shirt_color}`),
            getLayer('pants', tempLook.pants_color),
            getWrist(tempLook),
          ]);
          const tmp = document.createElement('canvas');
          tmp.width = 32; tmp.height = 40;
          const tctx = tmp.getContext('2d');
          tctx.imageSmoothingEnabled = false;
          for (const layer of [body, pants, shirt, wrist, head, wrinkles, eyes, beard, mustache, hair]) {
            if (layer) tctx.drawImage(layer, 16, 640 + 4, 32, 40, 0, 0, 32, 40);
          }
          ctx.clearRect(0, 0, 32, 40);
          ctx.drawImage(tmp, 0, 0);
        } catch (e) {}
      }, 0);
    }
    div.onclick = () => setOpt(category, item);
    if (state[category] === item) div.classList.add('sel');
    c.appendChild(div);
  }
}

async function init() {
  await buildOption('opt-body', 'body', manifest.bodies);
  await buildOption('opt-eye-color', 'eye_color', manifest.eye_colors, true);
  await buildOption('opt-wrinkles', 'wrinkles', manifest.wrinkle_options);
  await buildOption('opt-hair-style', 'hair_style', manifest.hair_styles);
  await buildOption('opt-hair-color', 'hair_color', manifest.hair_colors, true);
  await buildOption('opt-beard-style', 'beard_style', manifest.beard_styles);
  await buildOption('opt-mustache-style', 'mustache_style', manifest.mustache_styles);
  await buildOption('opt-beard-color', 'beard_color', manifest.beard_colors, true);
  await buildOption('opt-shirt-style', 'shirt_style', manifest.shirt_styles);
  await buildOption('opt-shirt-color', 'shirt_color',
    [...new Set([...manifest.shirt_colors_short, ...manifest.shirt_colors_sleeve])], true);
  await buildOption('opt-pants-color', 'pants_color', manifest.pants_colors, true);
  await buildOption('opt-shoe-color', 'shoe_color', manifest.shoe_colors, true);
  await buildOption('opt-wrist-color', 'wrist_color', manifest.wrist_colors, true);
  rerender();
}

function randomize() {
  const pick = a => a[Math.floor(Math.random() * a.length)];
  state.body = pick(manifest.bodies);
  state.eye_color = pick(manifest.eye_colors);
  state.wrinkles = Math.random() < 0.1 ? 'on' : 'none';     // 老將比例 ~10%
  state.hair_style = pick(manifest.hair_styles);
  state.hair_color = pick(manifest.hair_colors);
  state.beard_style = Math.random() < 0.1 ? pick(manifest.beard_styles.filter(s => s !== 'none')) : 'none';
  state.mustache_style = Math.random() < 0.05 ? pick(manifest.mustache_styles.filter(s => s !== 'none')) : 'none';
  state.beard_color = pick(manifest.beard_colors);
  state.shirt_style = pick(manifest.shirt_styles);
  state.shirt_color = state.shirt_style === 'shortsleeve'
    ? pick(manifest.shirt_colors_short)
    : pick(manifest.shirt_colors_sleeve);
  state.pants_color = pick(manifest.pants_colors);
  state.shoe_color = pick(manifest.shoe_colors.filter(c => c !== 'none'));
  state.wrist_color = Math.random() < 0.3 ? pick(manifest.wrist_colors.filter(c => c !== 'none')) : 'none';
  Object.keys(state).forEach(k => {
    document.querySelectorAll(`[data-${k}]`).forEach(el => {
      el.classList.toggle('sel', el.dataset[k] === state[k]);
    });
  });
  rerender();
}

function copyLook() {
  navigator.clipboard.writeText(JSON.stringify(state, null, 2));
  alert('已複製設定到剪貼簿：\n' + JSON.stringify(state, null, 2));
}

init();
</script>

</body>
</html>
