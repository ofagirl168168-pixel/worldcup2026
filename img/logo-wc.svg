<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- FIFA World Cup 2026 stylized logo -->
  <defs>
    <linearGradient id="wc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e4002b"/>
      <stop offset="33%" stop-color="#00b140"/>
      <stop offset="66%" stop-color="#0072ce"/>
      <stop offset="100%" stop-color="#e4002b"/>
    </linearGradient>
  </defs>
  <!-- Trophy shape -->
  <path d="M60 8 L85 18 L85 50 C85 75 73 90 60 98 C47 90 35 75 35 50 L35 18 Z" fill="none" stroke="url(#wc-grad)" stroke-width="4"/>
  <!-- Inner circle -->
  <circle cx="60" cy="50" r="22" fill="none" stroke="url(#wc-grad)" stroke-width="2.5" opacity="0.6"/>
  <!-- 26 text -->
  <text x="60" y="57" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="900" fill="url(#wc-grad)">26</text>
  <!-- FIFA text -->
  <text x="60" y="22" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="2">FIFA</text>
  <!-- Star at bottom -->
  <text x="60" y="85" text-anchor="middle" font-size="10" fill="url(#wc-grad)">★</text>
</svg>
